name: ev_navigator
description: Türkiye'nin Elektrikli Araç Süper Uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.3.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0

  # Auth Providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Maps
  google_maps_flutter: ^2.9.0
  google_maps_cluster_manager: ^3.1.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Network
  dio: ^5.7.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
